<!doctype html>
<html lang="en" class="is-mobile-top">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yasu Nakamura — Mobile</title>

  <!-- 共通DNA -->
  <link rel="stylesheet" href="assets/theme.css?v=20260223a" />
  <!-- スマホ専用 -->
  <link rel="stylesheet" href="assets/mobile.css?v=20260223a" />
</head>

<body class="mobile-top">
  <header class="m-head">
    <!-- モバイルからPCトップへ戻る導線 -->
    <a class="m-back" href="index.html?desktop=1">DESKTOP →</a>

    <!-- CONTACT（既存のメール先に合わせて変更OK） -->
    <a class="m-contact" href="mailto:yourmail@example.com?subject=Portfolio%20Inquiry">CONTACT</a>
  </header>

  <main class="m-top">
    <h1 class="m-siteTitle">YASU — STRUCTURAL WORKS</h1>
    <p class="m-siteStmt">
      LIGHT IS FORCE.<br>
      STRUCTURE IS RESISTANCE.
    </p>

    <section class="m-cat">
      <div id="mCatGrid" class="m-catGrid" aria-live="polite"></div>
    </section>
  </main>

  <script>
  (async function(){
    const mount = document.getElementById('mCatGrid');
    if (!mount) return;

    try{
      const res = await fetch('data/categories.json?v=20260223a', { cache:'no-store' });
      if(!res.ok) throw new Error('Failed to load categories.json');
      const cats = await res.json();

      mount.innerHTML = cats.map(c => {
        // ★スマホは「必ず」各カテゴリの mobile.html へ
        // mobileHref が categories.json に無くても動くように保険を入れる
        const link = c.mobileHref || `series/${c.slug}/mobile.html`;

        const cover = c.cover ? `
          <img class="m-catImg" src="${esc(c.cover)}" alt="" loading="lazy" decoding="async">
        ` : '';

        return `
          <a class="m-catCard" href="${esc(link)}" aria-label="${esc(c.title)}">
            ${cover}
            <div class="m-catText">
              <div class="m-catTitle">${esc(c.title)}</div>
              <div class="m-catSub">${esc(c.subtitle || '')}</div>
            </div>
          </a>
        `;
      }).join('');

    }catch(e){
      console.error(e);
      mount.innerHTML = `<p style="opacity:.8;padding:18px">FAILED TO LOAD CATEGORIES.</p>`;
    }

    function esc(s){
      return String(s ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }
  })();
  </script>
</body>
</html>
