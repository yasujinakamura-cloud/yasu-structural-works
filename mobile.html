<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yasu Nakamura — Mobile</title>

  <!-- PCと同じ見た目DNA -->
  <link rel="stylesheet" href="assets/theme.css?v=20260223a" />
  <!-- スマホ専用 -->
  <link rel="stylesheet" href="assets/mobile.css?v=20260223a" />
</head>

<body class="mobile-top">
  <header class="m-head">
    <!-- 左：PCトップへ戻す（任意） -->
    <a class="m-back" href="index.html">← HOME</a>

    <!-- 右：メール -->
    <a class="m-mail" href="mailto:yourmail@example.com?subject=Portfolio%20Inquiry">CONTACT</a>
  </header>

  <main class="m-top">
    <h1 class="m-brand">YASU — STRUCTURAL WORKS</h1>

    <p class="m-topStatement">
      LIGHT IS FORCE.<br>
      STRUCTURE IS RESISTANCE.
    </p>

    <!-- ここにカテゴリカードを描画 -->
    <section class="m-cats" aria-label="Categories">
      <div id="mCatGrid" class="m-catGrid" aria-live="polite"></div>
    </section>
  </main>

  <script>
  (async function(){
    // 念のため：PC幅で開いたらトップへ戻す（不要なら削除OK）
    const isMobile = window.matchMedia('(max-width: 700px)').matches;
    if(!isMobile){
      // ?mobile=1 で強制表示したい場合の逃げ道
      const params = new URLSearchParams(location.search);
      if(params.get('mobile') !== '1'){
        location.replace('index.html');
        return;
      }
    }

    const mount = document.getElementById('mCatGrid');
    if(!mount) return;

    try{
      const res = await fetch('data/categories.json', { cache: 'no-store' });
      if(!res.ok) throw new Error('Failed to load categories.json');
      const cats = await res.json();

      mount.innerHTML = cats.map(c => {
        // ★スマホトップは mobileHref を優先（これが核心）
        const link = (c.mobileHref || c.href || '#');
        const hasCover = Boolean(c.cover);

        return `
          <a class="m-catCard" href="${escapeHtml(link)}" aria-label="${escapeHtml(c.title)}">
            ${hasCover ? `<img class="m-catImg" src="${escapeHtml(c.cover)}" alt="" loading="lazy" decoding="async">` : ``}
            <div class="m-catOverlay" aria-hidden="true"></div>
            <div class="m-catText">
              <div class="m-catTitle">${escapeHtml(c.title)}</div>
              <div class="m-catSub">${escapeHtml(c.subtitle || '')}</div>
              <div class="m-catEnter">ENTER →</div>
            </div>
          </a>
        `;
      }).join('');

    }catch(e){
      console.error(e);
      mount.innerHTML = `<p style="padding:18px;opacity:.8">FAILED TO LOAD CATEGORIES.</p>`;
    }

    function escapeHtml(s){
      return String(s ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#039;");
    }
  })();
  </script>
</body>
</html>
