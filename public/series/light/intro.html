<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LIGHT — YASU</title>
  <link rel="stylesheet" href="../../assets/theme.css" />
</head>

<body>
  <main class="seriesIntro" aria-label="Series intro">
    <div class="seriesIntro__inner">
      <div class="seriesIntro__kicker">SERIES</div>
      <h1 class="seriesIntro__title" id="introTitle">LIGHT</h1>
      <p class="seriesIntro__statement" id="introStatement">
        LIGHT IS FORCE.
      </p>
    </div>
  </main>

  <script>
    // 2秒は必ず表示
    setTimeout(() => {
      document.body.classList.add('is-leaving');
      setTimeout(() => {
        const isMobile = window.matchMedia('(max-width: 700px)').matches;
        const target = isMobile ? './mobile.html' : './light-01.html';
        location.replace(target + (location.search || '') + (location.hash || ''));
      }, 230);
    }, 2000);
  </script>
</body>
</html>
