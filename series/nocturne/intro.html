<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NOCTURNE — YASU</title>
  <link rel="stylesheet" href="../../assets/theme.css" />
</head>

<body>
  <main class="seriesIntro" aria-label="Series intro">
    <div class="seriesIntro__inner">
      <div class="seriesIntro__kicker">SERIES</div>
      <h1 class="seriesIntro__title" id="introTitle">NOCTURNE</h1>
      <p class="seriesIntro__statement" id="introStatement">
        THE NIGHT REMEMBERS NOTHING.
      </p>
    </div>
  </main>

  <script>
  const go = () => {
    document.body.classList.add('is-leaving');

    setTimeout(() => {
      const isMobile = window.matchMedia('(max-width: 700px)').matches;

      // スマホは縦スナップへ、PCはviewerへ
      const target = isMobile ? './mobile.html' : './nocturne-01.html';

      location.replace(target + (location.search || '') + (location.hash || ''));
    }, 230);
  };

  // 初回は必ず2秒
  let t = setTimeout(go, 2000);

  // BFCache復帰のときだけ短縮（PCで即消え防止）
  window.addEventListener('pageshow', (e) => {
    if (!e.persisted) return;
    clearTimeout(t);
    t = setTimeout(go, 200);
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    clearTimeout(t);
    t = setTimeout(go, 200);
  });
</script>




</body>
</html>
