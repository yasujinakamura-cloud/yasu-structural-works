<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>STRUCTURE — YASU</title>
  <meta http-equiv="refresh" content="2; url=structure-01.html">
  <link rel="stylesheet" href="../../assets/theme.css" />
</head>

<body>
  <main class="seriesIntro" aria-label="Series intro">
    <div class="seriesIntro__inner">
      <div class="seriesIntro__kicker">SERIES</div>
      <h1 class="seriesIntro__title" id="introTitle">STRUCTURE</h1>
      <p class="seriesIntro__statement" id="introStatement">
        LIGHT IS FORCE. STRUCTURE IS RESISTANCE.
      </p>
    </div>
  </main>

 <script>
  function isBackForward(){
    try{
      const nav = performance.getEntriesByType('navigation')[0];
      return nav && nav.type === 'back_forward';
    }catch(_){ return false; }
  }

  const delay = isBackForward() ? 200 : 2000;

  setTimeout(() => {
    document.body.classList.add('is-leaving');
    setTimeout(() => {
      const isMobile = window.matchMedia('(max-width: 700px)').matches;
      const target = isMobile ? './mobile.html' : './structure-01.html';
      location.replace(target + (location.search || '') + (location.hash || ''));
    }, 230);
  }, delay);
</script>
</body>
</html>
