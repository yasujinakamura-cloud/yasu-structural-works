<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>STRUCTURE — YASU</title>
  <meta http-equiv="refresh" content="2; url=structure-01.html">
  <link rel="stylesheet" href="../../assets/theme.css" />
</head>

<body>
  <main class="seriesIntro" aria-label="Series intro">
    <div class="seriesIntro__inner">
      <div class="seriesIntro__kicker">SERIES</div>
      <h1 class="seriesIntro__title" id="introTitle">STRUCTURE</h1>
      <p class="seriesIntro__statement" id="introStatement">
        LIGHT IS FORCE. STRUCTURE IS RESISTANCE.
      </p>
    </div>
  </main>

 <script>
  const go = () => {
    document.body.classList.add('is-leaving');
    setTimeout(() => {
      const next = './structure-01.html' + (location.search || '') + (location.hash || '');
      location.replace(next);
    }, 230);
  };

  // 初回表示は必ず2秒
  let t = setTimeout(go, 2000);

  // BFCache復帰のときだけ短縮（←ここが重要）
  window.addEventListener('pageshow', (e) => {
    if (!e.persisted) return;     // 初回ロードでは何もしない
    clearTimeout(t);
    t = setTimeout(go, 200);
  });

  // タブ復帰などの保険（初回は通常起きない）
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    clearTimeout(t);
    t = setTimeout(go, 200);
  });
</script>
</body>
</html>
