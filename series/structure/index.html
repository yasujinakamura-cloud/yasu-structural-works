<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>STRUCTURE | Series — Yasu Nakamura</title>
  <meta name="description" content="STRUCTURE — a monochrome series by Yasu Nakamura. Explore works and enter the viewer." />
  <link rel="canonical" href="https://yasu-nakamura.com/series/structure/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="STRUCTURE | Series — Yasu Nakamura" />
  <meta property="og:description" content="Monochrome series exploring form, resistance, and the grid." />
  <meta property="og:url" content="https://yasu-nakamura.com/series/structure/" />

  <link rel="stylesheet" href="../../assets/theme.css" />

  <!-- このページ専用の最小レイアウト（他に影響しない） -->
  <style>
    .seriesIndex{ max-width: 1100px; margin: 0 auto; padding: 26px 18px 44px; }
    .seriesIndex__top{ display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom: 18px; }
    .seriesIndex__back{ opacity:.8; letter-spacing:.08em; }
    .seriesIndex__back:hover{ opacity:1; }
    .seriesIndex__kicker{ opacity:.6; letter-spacing:.18em; font-size:12px; }
    .seriesIndex__title{ margin: 10px 0 6px; letter-spacing:.12em; font-size: 26px; }
    .seriesIndex__statement{ margin: 0 0 18px; opacity:.78; letter-spacing:.06em; line-height:1.5; }

    .worksGrid{ display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
    @media (max-width: 900px){ .worksGrid{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 560px){ .worksGrid{ grid-template-columns: 1fr; } }

    .workCard{ border:1px solid rgba(255,255,255,.14); border-radius: 14px; padding: 14px; display:flex; flex-direction:column; gap:10px; }
    .workCard:hover{ border-color: rgba(255,255,255,.28); }
    .workCard__num{ opacity:.7; letter-spacing:.18em; font-size:12px; }
    .workCard__label{ letter-spacing:.12em; font-size:16px; }
    .workCard__enter{ margin-top:auto; opacity:.85; letter-spacing:.10em; font-size:12px; }
  </style>
</head>

<body>
  <main class="seriesIndex" aria-label="Series page">
    <div class="seriesIndex__top">
      <a class="seriesIndex__back" href="../../index.html">← HOME</a>
      <div class="seriesIndex__kicker">SERIES</div>
    </div>

    <h1 class="seriesIndex__title" id="seriesTitle">STRUCTURE</h1>
    <p class="seriesIndex__statement" id="seriesStatement">LIGHT IS FORCE. STRUCTURE IS RESISTANCE.</p>

    <section aria-label="Works list">
      <div class="worksGrid" id="worksGrid"></div>
    </section>
  </main>

  <script>
    (async function(){
      const titleEl = document.getElementById('seriesTitle');
      const stmtEl  = document.getElementById('seriesStatement');
      const grid    = document.getElementById('worksGrid');

      try{
        const res = await fetch('./structure.json', { cache: 'no-store' });
        if(!res.ok) throw new Error('json load failed');
        const data = await res.json();

        if(titleEl && data.title) titleEl.textContent = data.title;
        const msg = data.statement || data.definition || '';
        if(stmtEl && msg) stmtEl.textContent = msg;

        const images = Array.isArray(data.images) ? data.images : [];
        if(!images.length) throw new Error('No images in JSON');

        grid.innerHTML = images.map((_, idx) => {
          const n = String(idx + 1).padStart(2,'0');
          return `
            <a class="workCard" href="structure-${n}.html" aria-label="Open STRUCTURE ${n}">
              <div class="workCard__num">WORK</div>
              <div class="workCard__label">STRUCTURE ${n}</div>
              <div class="workCard__enter">ENTER →</div>
            </a>
          `;
        }).join('');
      }catch(e){
        grid.innerHTML = '<p style="opacity:.8;letter-spacing:.08em;">Works not available.</p>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
